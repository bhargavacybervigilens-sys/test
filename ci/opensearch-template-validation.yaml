name: opensearch-template-validation
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: python -m json.tool opensearch/templates/component-common.json > /dev/null
      - run: python -m json.tool opensearch/templates/logs-linux-auth.json > /dev/null
