cloudtrail-pipeline:
  source:
    pipeline:
      name: "router-pipeline"
  processor:
    - add_entries:
        entries:
          - key: "event.dataset"
            value: "cloudtrail.audit"
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        insecure: true
        username: "admin"
        password: "admin"
        index: "logs-cloud-cloudtrail"
