firewall-pipeline:
  source:
    pipeline:
      name: "router-pipeline"
  processor:
    - add_entries:
        entries:
          - key: "event.dataset"
            value: "firewall.traffic"
  sink:
    - opensearch:
        hosts: ["https://opensearch:9200"]
        insecure: true
        username: "admin"
        password: "admin"
        index: "logs-network-firewall"
